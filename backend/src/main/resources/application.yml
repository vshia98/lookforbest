spring:
  application:
    name: lookforbest-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/lookforbest?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${DB_USERNAME:lookforbest}
    password: ${DB_PASSWORD:lookforbest}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3000ms

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true

  cache:
    type: redis
    redis:
      time-to-live: 1800000  # 30分钟

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: ${PORT:8080}
  servlet:
    context-path: /

app:
  jwt:
    secret: ${JWT_SECRET:lookforbest-super-secret-key-change-in-production}
    access-token-expiry: 7200     # 2小时（秒）
    refresh-token-expiry: 2592000 # 30天（秒）
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:80}
  rate-limit:
    enabled: ${RATE_LIMIT_ENABLED:true}
    default-limit: ${RATE_LIMIT_DEFAULT:100}
    auth-limit: ${RATE_LIMIT_AUTH:20}
    window-seconds: 60
  recommend:
    url: ${RECOMMEND_URL:http://localhost:8000}
    enabled: ${RECOMMEND_ENABLED:false}
  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://localhost:9200}
    username: ${ELASTICSEARCH_USERNAME:}
    password: ${ELASTICSEARCH_PASSWORD:}
    enabled: ${ELASTICSEARCH_ENABLED:false}
  crawler:
    url: ${CRAWLER_URL:http://localhost:8002}
  anthropic:
    api-key: ${ANTHROPIC_API_KEY:}
    model: ${ANTHROPIC_MODEL:claude-sonnet-4-6}
  site:
    base-url: ${SITE_BASE_URL:https://lookforbest.com}
  storage:
    type: ${STORAGE_TYPE:minio}
    minio:
      endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
      access-key: ${MINIO_ACCESS_KEY:minioadmin}
      secret-key: ${MINIO_SECRET_KEY:minioadmin}
      bucket: ${MINIO_BUCKET:lookforbest}
  oauth:
    wechat:
      app-id: ${WECHAT_MINIAPP_APP_ID:}
      app-secret: ${WECHAT_MINIAPP_APP_SECRET:}
    wechat-web:
      app-id: ${WECHAT_WEB_APP_ID:}
      app-secret: ${WECHAT_WEB_APP_SECRET:}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

# Actuator 监控配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,caches,loggers
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      show-components: when-authorized
    metrics:
      enabled: true
    prometheus:
      enabled: true
    caches:
      enabled: true
    loggers:
      enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5,0.90,0.95,0.99
      slo:
        http.server.requests: 50ms,100ms,200ms,500ms,1s
    tags:
      application: ${spring.application.name}
