name: lookforbest_app
description: "LookForBest - 全球机器人展示平台 App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # 状态管理
  hooks_riverpod: ^2.6.1
  flutter_riverpod: ^2.6.1
  flutter_hooks: ^0.20.5
  riverpod_annotation: ^2.3.5

  # 路由
  go_router: ^14.8.1

  # 网络
  dio: ^5.7.0

  # 本地存储
  flutter_secure_storage: ^9.2.4
  hive_flutter: ^1.1.0

  # 图片
  cached_network_image: ^3.4.1
  photo_view: ^0.15.0

  # 3D 模型展示
  model_viewer_plus: ^1.9.0

  # 国际化
  intl: ^0.20.2

  # UI
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.17

  # 社交登录
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1
  mockito: ^5.4.4
  # 图标生成
  flutter_launcher_icons: ^0.14.3
  # 启动页
  flutter_native_splash: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
  generate: true

# 应用图标配置（运行 flutter pub run flutter_launcher_icons 生效）
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  web:
    generate: false

# 启动页配置（运行 flutter pub run flutter_native_splash:create 生效）
flutter_native_splash:
  color: "#6366F1"
  image: assets/icons/splash_logo.png
  android: true
  ios: true
  android_gravity: center
  ios_content_mode: center
  fullscreen: false
