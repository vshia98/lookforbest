name: Uniapp Miniapp Build

on:
  push:
    branches: [main, master]
    paths:
      - 'lookforbest_miniapp/**'
      - '.github/workflows/miniapp-build.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'lookforbest_miniapp/**'
  workflow_dispatch:

jobs:
  build-weapp:
    name: Build WeChat Miniapp
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: lookforbest_miniapp/package-lock.json

      - name: Install dependencies
        working-directory: lookforbest_miniapp
        run: npm ci

      - name: Build WeChat Miniapp
        working-directory: lookforbest_miniapp
        run: npm run build:mp-weixin
        env:
          VITE_API_BASE_URL: ${{ vars.API_BASE_URL || 'https://api.lookforbest.com/api/v1' }}

      - name: Upload WeApp dist
        uses: actions/upload-artifact@v4
        with:
          name: weapp-dist
          path: lookforbest_miniapp/dist/build/mp-weixin/
          retention-days: 30
