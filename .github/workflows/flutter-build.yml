name: Flutter Build (Android + iOS)

on:
  push:
    branches: [main, master]
    paths:
      - 'lookforbest_app/**'
      - '.github/workflows/flutter-build.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'lookforbest_app/**'
  workflow_dispatch:
    inputs:
      api_base_url:
        description: 'API Base URL'
        required: false
        default: 'https://api.lookforbest.com/api/v1'

env:
  API_BASE_URL: ${{ inputs.api_base_url || vars.API_BASE_URL || 'https://api.lookforbest.com/api/v1' }}

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: stable
          cache: true

      - name: Get dependencies
        working-directory: lookforbest_app
        run: flutter pub get

      - name: Generate launcher icons
        working-directory: lookforbest_app
        run: flutter pub run flutter_launcher_icons

      - name: Generate native splash
        working-directory: lookforbest_app
        run: flutter pub run flutter_native_splash:create

      - name: Run tests
        working-directory: lookforbest_app
        run: flutter test

      # Android 签名配置（需要在 GitHub Secrets 中设置以下变量）：
      # ANDROID_KEYSTORE_BASE64 — keystore 文件的 Base64 编码
      # ANDROID_KEY_ALIAS       — key alias
      # ANDROID_KEY_PASSWORD    — key 密码
      # ANDROID_STORE_PASSWORD  — keystore 密码
      - name: Setup Android signing
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        working-directory: lookforbest_app/android
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > app/lookforbest-release.jks
          cat > key.properties <<EOF
          storePassword=$ANDROID_STORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=lookforbest-release.jks
          EOF

      - name: Build Android APK (release)
        working-directory: lookforbest_app
        run: |
          flutter build apk --release \
            --dart-define=API_BASE_URL=${{ env.API_BASE_URL }}

      - name: Build Android App Bundle
        working-directory: lookforbest_app
        run: |
          flutter build appbundle --release \
            --dart-define=API_BASE_URL=${{ env.API_BASE_URL }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: lookforbest_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: lookforbest_app/build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: stable
          cache: true

      - name: Get dependencies
        working-directory: lookforbest_app
        run: flutter pub get

      - name: Generate launcher icons
        working-directory: lookforbest_app
        run: flutter pub run flutter_launcher_icons

      - name: Generate native splash
        working-directory: lookforbest_app
        run: flutter pub run flutter_native_splash:create

      - name: Build iOS (no codesign)
        working-directory: lookforbest_app
        run: |
          flutter build ios --release --no-codesign \
            --dart-define=API_BASE_URL=${{ env.API_BASE_URL }}

      - name: Package IPA
        working-directory: lookforbest_app
        run: |
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r ../../../lookforbest.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: lookforbest_app/lookforbest.ipa
          retention-days: 30
