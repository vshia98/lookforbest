version: '3.9'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: lookforbest-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: lookforbest
      MYSQL_USER: ${DB_USERNAME:-lookforbest}
      MYSQL_PASSWORD: ${DB_PASSWORD:-lookforbest}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    deploy:
      resources:
        limits:
          memory: 1g
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${DB_USERNAME:-lookforbest}", "-p${DB_PASSWORD:-lookforbest}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: lookforbest-redis
    restart: unless-stopped
    command: >
      sh -c "if [ -n '$$REDIS_PASSWORD' ]; then
               redis-server --requirepass $$REDIS_PASSWORD;
             else
               redis-server;
             fi"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 256m
    healthcheck:
      test: >
        sh -c "if [ -n '$$REDIS_PASSWORD' ]; then
                 redis-cli -a $$REDIS_PASSWORD ping;
               else
                 redis-cli ping;
               fi"
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO 对象存储
  minio:
    image: minio/minio:latest
    container_name: lookforbest-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Elasticsearch（含 IK 中文分词插件）
  elasticsearch:
    image: elasticsearch:8.13.4
    container_name: lookforbest-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "127.0.0.1:9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
      - ./scripts/es-init.sh:/usr/local/bin/es-init.sh
    deploy:
      resources:
        limits:
          memory: 1.5g
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health?wait_for_status=yellow || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s

  # Spring Boot 后端
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lookforbest-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:mysql://mysql:3306/lookforbest?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false
      DB_USERNAME: ${DB_USERNAME:-lookforbest}
      DB_PASSWORD: ${DB_PASSWORD:-lookforbest}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: lookforbest
      JWT_SECRET: ${JWT_SECRET:-lookforbest-change-this-in-production}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://${DOMAIN:-localhost}}
      RECOMMEND_URL: http://recommend:8000
      RECOMMEND_ENABLED: "true"
      SITE_BASE_URL: ${SITE_BASE_URL:-https://${DOMAIN:-localhost}}
      ELASTICSEARCH_URIS: http://elasticsearch:9200
      ELASTICSEARCH_ENABLED: "true"
      CRAWLER_URL: http://crawler:8002
      SWAGGER_ENABLED: "false"
      # nginx 容器通过 Docker 内网转发请求，其 IP 在 172.x 段，信任该段的代理 IP
      RATE_LIMIT_TRUSTED_PROXIES: "127.0.0.1,::1,172."
    deploy:
      resources:
        limits:
          memory: 1g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Vue3 前端（仅内部访问，由 nginx 反向代理）
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lookforbest-frontend
    restart: unless-stopped
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 128m

  # Nginx 反向代理 + SSL 终止
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: lookforbest-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    command: >
      sh -c "while :; do sleep 6h & wait $${!}; nginx -s reload; done &
             /entrypoint.sh"
    deploy:
      resources:
        limits:
          memory: 128m

  # Certbot（SSL 证书申请与自动续期）
  certbot:
    image: certbot/certbot:latest
    container_name: lookforbest-certbot
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: >
      sh -c "trap exit TERM;
             while :; do
               certbot renew --quiet --webroot --webroot-path=/var/www/certbot;
               sleep 12h & wait $${!};
             done"

  # AI 推荐服务
  recommend:
    build:
      context: ./recommend
      dockerfile: Dockerfile
    container_name: lookforbest-recommend
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: lookforbest
      DB_USER: ${DB_USERNAME:-lookforbest}
      DB_PASSWORD: ${DB_PASSWORD:-lookforbest}
      PORT: 8000
    ports:
      - "127.0.0.1:8001:8000"
    depends_on:
      mysql:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m

  # 配置化爬虫服务
  crawler:
    build:
      context: ./crawler
      dockerfile: Dockerfile
    container_name: lookforbest-crawler
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: lookforbest
      DB_USER: ${DB_USERNAME:-lookforbest}
      DB_PASSWORD: ${DB_PASSWORD:-lookforbest}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: lookforbest
      PORT: 8002
    ports:
      - "127.0.0.1:8002:8002"
    volumes:
      - ./scripts:/app/scripts
    depends_on:
      mysql:
        condition: service_healthy
      minio:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  mysql_data:
  redis_data:
  minio_data:
  elasticsearch_data:
  certbot_conf:
  certbot_www:
